name: Auto-Login Trigger

# Independent backup path to the in-process daemon. If the daemon in
# main.py fails to fire (thread dead, container restart, network
# blip), this workflow runs on GitHub's infrastructure and POSTs to
# /api/auto-login. Defense in depth: Render-internal daemon + external
# GitHub cron = redundant trigger sources.
#
# SCHEDULE
#   Daily 03:20 UTC = 08:50 IST, weekdays only (Mon-Fri).
#   Cron uses UTC. India is UTC+5:30, so:
#     08:50 IST = 03:20 UTC
#   GitHub's cron is best-effort — actual firing can be 5-15 min late,
#   but the in-process daemon's window extends to 09:25 IST so this
#   still hits within the live window.
#
# REQUIREMENTS
#   GitHub repo secrets:
#     RENDER_BACKEND_URL  →  https://universe-dashboard.onrender.com
#   No Kite credentials needed here — the Render backend reads them
#   from its own env vars when /api/auto-login is called with empty body.

on:
  schedule:
    # min hour day_of_month month day_of_week (UTC)
    # 08:52 IST = 03:22 UTC — fires 2 min after daemon's window opens.
    # GitHub cron is best-effort (can lag 5-15 min), so this hits
    # within the daemon's 08:50-09:00 window most days.
    - cron: '22 3 * * 1-5'   # 08:52 IST weekdays
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  trigger-autologin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/auto-login on Render
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::RENDER_BACKEND_URL secret not set"
            exit 1
          fi
          echo "Triggering auto-login at $(date -u) UTC"
          # Best-effort: send empty POST so backend uses cached creds.
          # --max-time 60 because Kite login can take 20-30s.
          # --fail-with-body shows the error response, but we don't
          # fail the workflow on HTTP errors (backend may already
          # have logged in successfully via the in-process daemon).
          response=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d '{"trigger_source":"external_cron"}' \
            --max-time 90 \
            -w "\nHTTP_STATUS:%{http_code}\n" \
            "${BACKEND_URL}/api/auto-login" || true)
          echo "$response"
          status=$(echo "$response" | tail -1 | sed 's/HTTP_STATUS://')
          echo "Backend responded with HTTP $status"
          # Don't fail the workflow on non-200 — the daemon may have
          # succeeded first. We log the result for the audit trail.

      - name: Confirm engine state
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          sleep 5
          state=$(curl -s --max-time 30 "${BACKEND_URL}/api/status" || true)
          echo "Engine status: $state"
          if echo "$state" | grep -q '"engine_running":true'; then
            echo "::notice::Engine is running"
          else
            echo "::warning::Engine NOT running — daemon may have failed"
            # Still don't fail — Render logs + Telegram alerts will
            # surface this to the operator.
          fi
