name: CI

# Runs on every push and PR.
# Backend: pytest, syntax check, import check.
# Frontend: vite build, eslint.
# Both must pass before merge to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Don't run multiple builds for the same commit
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Verify all backend files compile
        run: |
          cd backend
          python -m compileall -q . || (echo "Syntax error in backend Python files" && exit 1)

      - name: Run pytest with coverage
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Check bundle size
        run: |
          MAIN_SIZE=$(du -k dist/assets/index-*.js | head -1 | cut -f1)
          echo "Main bundle: ${MAIN_SIZE} KB"
          if [ "$MAIN_SIZE" -gt "600" ]; then
            echo "::warning::Main bundle exceeds 600 KB ($MAIN_SIZE KB)"
          fi

      - name: Lint (non-blocking)
        run: npm run lint || true
        continue-on-error: true

  # Status check: BOTH must pass
  required-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: always()
    steps:
      - name: Verify all dependencies succeeded
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "Frontend build failed"
            exit 1
          fi
          echo "All checks passed ✅"
